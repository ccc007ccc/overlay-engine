# Core Server Monitor Launch Configuration
# Any line starting with "Launch=" will be executed as a child process when the server starts.
# When the server exits, these child processes will be automatically terminated.

# Example: Launch the Desktop Window Monitor
Launch=target\release\desktop-window-monitor.exe

# Example: Launch a UWP App (like the Game Bar Widget) using its Application User Model ID (AUMID)
# You would need the correct AUMID of the installed package here.
# Launch=explorer.exe shell:AppsFolder/OverlayWidget_pwe4p8s9q1v1c!App
