# Core Server Monitor Capability Catalog
# Desktop Window Monitor is installed as an app-started capability, not auto-launched by core-server.

Monitor.DesktopWindow.Path=target\release\desktop-window-monitor.exe
Monitor.DesktopWindow.MaxInstancesPerApp=16
Monitor.DesktopWindow.WindowModes=bordered,borderless,borderless-fullscreen
Monitor.DesktopWindow.Flags=click-through

# Xbox Game Bar widget is user-opened with Win+G and is never started or closed by core-server.
Monitor.GameBar.Available=true
Monitor.GameBar.MaxInstances=1
Monitor.GameBar.StartPolicy=user-manual
